name: Go test&lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  parse-go-work:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: extract
        run: |
          {
            echo -n "matrix="
            find . -name "go.mod" -exec dirname {} \; | grep -v "/test/ginkgo" | jq -c -R -s 'split("\n") | map(select(length > 0))'
          } >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: [parse-go-work]
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.parse-go-work.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          cache-dependency-path: ${{ matrix.directory }}
      - name: Run test
        run: |
          go test ./... --shuffle on --parallel 10 --p 10
        working-directory: ${{ matrix.directory }}

  lint:
    runs-on: ubuntu-latest
    needs: [parse-go-work]
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.parse-go-work.outputs.matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          cache-dependency-path: ${{ matrix.directory }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          working-directory: ${{ matrix.directory }}

  test-ginkgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: test/ginkgo/go.mod
          cache-dependency-path: test/ginkgo
      - name: Run ginkgo test
        run: |
          go tool ginkgo -p
        working-directory: test/ginkgo
