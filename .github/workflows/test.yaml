name: Go test&lint

on:
  push:
    branches:
      - main
  pull_request:

env:
  GO_VERSION: stable

permissions:
  contents: read

jobs:
  parse-go-work:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.extract.outputs.matrix }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
      - id: extract
        run: |
          {
            echo -n "matrix="
            find . -name "go.mod" -exec dirname {} \; | grep -v "/test/ginkgo" | jq -c -R -s 'split("\n") | map(select(length > 0))'
          } >> "$GITHUB_OUTPUT"

  test:
    runs-on: ubuntu-latest
    needs: [parse-go-work]
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.parse-go-work.outputs.matrix) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.directory }}
      - name: Run test
        run: |
          go test ./... --shuffle on --parallel 10 --p 10
        working-directory: ${{ matrix.directory }}

  lint:
    runs-on: ubuntu-latest
    needs: [parse-go-work]
    strategy:
      fail-fast: false
      matrix:
        directory: ${{ fromJson(needs.parse-go-work.outputs.matrix) }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ matrix.directory }}
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          working-directory: ${{ matrix.directory }}

  test-ginkgo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: test/ginkgo
      - name: Install ginkgo
        run: |
          go install github.com/onsi/ginkgo/v2/ginkgo@latest
      - name: Run ginkgo test
        run: |
          go tool ginkgo -p
        working-directory: test/ginkgo
